name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Leo on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout Micascheme
        uses: actions/checkout@v4

      - name: Initialize and Build ChezScheme
        run: |
          # 1. Clean and Clone
          rm -rf deps/ChezScheme
          mkdir -p deps/ChezScheme
          git clone --depth 1 --branch make-read-handler https://github.com/micapolos/ChezScheme.git deps/ChezScheme

          # 2. Configure and Compile
          cd deps/ChezScheme
          ./configure
          make

      - name: Package Leo
        run: |
          mkdir -p dist/bin dist/lib

          # Use find to locate files in the nested build tree
          BINARY_PATH=$(find deps/ChezScheme -name scheme -type f -perm +111 | head -n 1)
          PETITE_PATH=$(find deps/ChezScheme -name petite.boot | head -n 1)
          SCHEME_PATH=$(find deps/ChezScheme -name scheme.boot | head -n 1)

          # Copy engine components
          cp "$BINARY_PATH" dist/bin/leo-bin
          cp "$PETITE_PATH" dist/lib/
          cp "$SCHEME_PATH" dist/lib/

          # Create the 'leo' wrapper script
          echo '#!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/bin/leo-bin" -b "$DIR/lib/petite.boot" -b "$DIR/lib/scheme.boot" "$@"' > dist/leo
          chmod +x dist/leo

          # Create the final archive
          tar -czvf micascheme-macos.tar.gz dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: micascheme-macos
          path: micascheme-macos.tar.gz
