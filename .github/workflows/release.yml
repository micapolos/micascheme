name: Build and Release micascheme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout Micascheme
        uses: actions/checkout@v4

      - name: Initialize and Fetch Shallow Submodule
        run: |
          # 1. Create the directory
          mkdir -p deps/ChezScheme

          # 2. Manual clone (this is more reliable than 'submodule init' in CI)
          git clone --depth 1 --branch make-read-handler https://github.com/micapolos/ChezScheme.git deps/ChezScheme

          # 3. Tell the main repo to track this folder as a submodule
          git submodule status

      - name: Cache ChezScheme Build
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: deps/ChezScheme
          key: ${{ runner.os }}-chez-${{ hashFiles('.gitmodules', 'deps/ChezScheme/.git') }}

      - name: Build Patched ChezScheme
        if: steps.cache-chez.outputs.cache-hit != 'true'
        run: |
          cd deps/ChezScheme
          ./configure
          make

      - name: Package Release
        run: |
          mkdir -p dist/bin dist/lib

          # Use find to locate the binary and boot files regardless of nesting
          BINARY_PATH=$(find deps/ChezScheme -name scheme -type f -perm +111 | head -n 1)
          PETITE_PATH=$(find deps/ChezScheme -name petite.boot | head -n 1)
          SCHEME_PATH=$(find deps/ChezScheme -name scheme.boot | head -n 1)

          cp "$BINARY_PATH" dist/bin/micascheme-bin
          cp "$PETITE_PATH" dist/lib/
          cp "$SCHEME_PATH" dist/lib/

          # Add the wrapper
          echo '#!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/bin/micascheme-bin" -b "$DIR/lib/petite.boot" -b "$DIR/lib/scheme.boot" "$@"' > dist/micascheme
          chmod +x dist/micascheme

          tar -czvf micascheme-macos.tar.gz dist/

      - name: Locate Boot Files
        run: find deps/ChezScheme -name "*.boot"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: micascheme-macos
          path: micascheme-macos.tar.gz
