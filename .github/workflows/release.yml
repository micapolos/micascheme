name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Leo on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache ChezScheme
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: deps/ChezScheme
          key: ${{ runner.os }}-chez-${{ hashFiles('.gitmodules', 'leo/build.sh') }}

      - name: Run Build Script
        run: ./leo/build.sh

      - name: Archive Dist
        run: |
          # Create a versioned folder name (e.g., leo-v1.0.0 or leo-main)
          RELEASE_NAME="leo-${{ github.ref_name }}"

          # Rename the dist folder produced by build.sh
          mv dist "$RELEASE_NAME"

          # Archive it
          tar -czvf leo-macos.tar.gz "$RELEASE_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leo-macos
          path: leo-macos.tar.gz
