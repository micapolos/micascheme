name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build Leo on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
          - os: macos
            arch: x64
            runner: macos-13
          - os: linux
            arch: x64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm-64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses5-dev libncursesw5-dev

      - name: Cache ChezScheme
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: deps/ChezScheme
          key: ${{ runner.os }}-chez-${{ hashFiles('deps/ChezScheme/s/**/*', 'deps/ChezScheme/c/**/*', 'deps/ChezScheme/m4/**/*') }}

      - name: Run Build Script
        run: |
          chmod +x ./leo/build.sh
          ./leo/build.sh "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Dynamic name based on the OS (e.g., leo-macos, leo-linux)
          name: leo-${{ runner.os }}
          path: build/*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: leo-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: release-artifacts/*.tar.gz
          body: "Automated build for version: ${{ github.ref_name }}"
          overwrite_files: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
