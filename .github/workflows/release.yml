name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Leo on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache ChezScheme
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: deps/ChezScheme
          key: ${{ runner.os }}-chez-${{ hashFiles('deps/ChezScheme/s/**/*', 'deps/ChezScheme/c/**/*', 'deps/ChezScheme/m4/**/*') }}

      - name: Run Build Script
        run: ./leo/build.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leo-macos
          path: release/leo-macos.tar.gz
