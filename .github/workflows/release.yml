name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    branches:
      - main  # This "primes" the cache so tags can inherit it
    tags:
      - 'v*'

jobs:
  build:
    name: Build Leo on ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
          - os: linux
            arch: x64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We don't pull submodules yet to keep the path clean for the cache
          submodules: false
          fetch-depth: 1

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses5-dev libncursesw5-dev libx11-dev uuid-dev

      - name: Get ChezScheme Submodule Commit
        id: submodule-sha
        run: |
          # Robust way to get the SHA without needing the files on disk
          echo "sha=$(git ls-tree HEAD deps/ChezScheme | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache ChezScheme
        id: cache-chez
        uses: actions/cache@v4
        with:
          path: deps/ChezScheme
          key: ${{ runner.os }}-${{ matrix.arch }}-chez-${{ steps.submodule-sha.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-chez-

      - name: Build ChezScheme (Only if cache missed)
        if: steps.cache-chez.outputs.cache-hit != 'true'
        run: |
          echo "Cache missed! Initializing submodule and compiling..."
          git submodule update --init --recursive deps/ChezScheme
          cd deps/ChezScheme
          ./configure
          make

      - name: Run Build Script
        run: |
          # Ensure submodules are at least initialized if we had a cache hit
          # (This is a fast no-op if they are already there)
          git submodule update --init --recursive
          chmod +x ./leo/build.sh
          ./leo/build.sh "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leo-${{ matrix.os }}-${{ matrix.arch }}
          path: build/*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run release logic for tags or manual dispatch
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: leo-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Leo Scheme {0}', github.ref_name) || 'Leo Scheme Latest' }}
          files: release-artifacts/*.tar.gz
          body: "Automated build for version: ${{ github.ref_name }}"
          overwrite_files: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
