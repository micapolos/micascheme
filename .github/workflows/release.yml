name: Build and Release Leo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Leo on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout Micascheme
        uses: actions/checkout@v4

      - name: Initialize and Build ChezScheme
        run: |
          # 1. Clean and Clone the engine source
          rm -rf deps/ChezScheme
          mkdir -p deps/ChezScheme
          git clone --depth 1 --branch make-read-handler https://github.com/micapolos/ChezScheme.git deps/ChezScheme

          # 2. Configure and Compile for Apple Silicon
          cd deps/ChezScheme
          ./configure
          make

      - name: Bootstrap Dist and Compile WPO
        run: |
          # 1. Define hardcoded source paths
          SRC_BIN="deps/ChezScheme/tarm64osx/bin/tarm64osx/scheme"
          SRC_BOOT="deps/ChezScheme/tarm64osx/boot/tarm64osx"

          # 2. Setup dist structure and copy engine components FIRST
          echo "Preparing dist environment..."
          mkdir -p dist/bin dist/lib
          cp "$SRC_BIN" dist/bin/scheme
          cp "$SRC_BOOT/petite.boot" dist/lib/
          cp "$SRC_BOOT/scheme.boot" dist/lib/

          # 3. Run WPO compilation using the 'dist' binaries
          # This script handles placing leo-whole.so into dist/lib automatically
          echo "Compiling Leo with WPO using dist binaries..."
          ./dist/bin/scheme \
              -b ./dist/lib/petite.boot \
              -b ./dist/lib/scheme.boot \
              --program "leo/compile-wpo.ss"

          # 4. Create the 'leo' wrapper script
          echo "Creating wrapper script..."
          echo '#!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/bin/scheme" -b "$DIR/lib/petite.boot" -b "$DIR/lib/scheme.boot" --program "$DIR/lib/leo-whole.so" "$@"' > dist/leo

          chmod +x dist/leo

          # 5. Create the final archive
          tar -czvf micascheme-macos.tar.gz dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: micascheme-macos
          path: micascheme-macos.tar.gz
