name: Build and Release micascheme

on:
  push:
    branches:
      - main  # Now it triggers every time you 'git push origin main'
  workflow_dispatch: # This adds a manual "Run" button in the GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Micascheme
        uses: actions/checkout@v4

      - name: Initialize and Fetch Shallow Submodule
        run: |
          # 1. Create the directory
          mkdir -p deps/ChezScheme

          # 2. Manual clone (this is more reliable than 'submodule init' in CI)
          git clone --depth 1 --branch make-read-handler https://github.com/micapolos/ChezScheme.git deps/ChezScheme

          # 3. Tell the main repo to track this folder as a submodule
          git submodule status

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y uuid-dev libncurses5-dev

      - name: Build Patched ChezScheme
        run: |
          cd deps/ChezScheme
          ./configure
          make

      - name: Package Release
        run: |
          mkdir -p dist/bin dist/lib
          # Automatically find the arch folder (ta6le, ta6osx, etc.)
          ARCH=$(ls deps/ChezScheme/boot | head -n 1)

          cp deps/ChezScheme/bin/$ARCH/scheme dist/bin/micascheme-bin
          cp deps/ChezScheme/boot/$ARCH/petite.boot dist/lib/
          cp deps/ChezScheme/boot/$ARCH/scheme.boot dist/lib/

          # Add your wrapper script
          echo '#!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/bin/micascheme-bin" -b "$DIR/lib/petite.boot" -b "$DIR/lib/scheme.boot" "$@"' > dist/micascheme
          chmod +x dist/micascheme

          tar -czvf micascheme-${{ runner.os }}.tar.gz dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: micascheme-${{ runner.os }}
          path: micascheme-${{ runner.os }}.tar.gz
